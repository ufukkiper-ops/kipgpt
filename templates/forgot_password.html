{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block content %}

<div class="auth-shell">
<div class="card">

<div class="auth-brand">
    <img class="auth-brand-logo" src="{{ url_for('static', filename='img/kipgpt-logo.png') }}" width="280" height="280" alt="KipGPT — Akıllı • Güvenilir • Yanında">
</div>

<h2>Şifremi Unuttum</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
{% if info %}
<div class="success">{{ info }}</div>
{% endif %}

<p class="register-note">Kayıtlı e-posta adresinize 6 haneli bir doğrulama kodu göndereceğiz.</p>

<form method="post" class="auth-form">
<input type="email" name="email" placeholder="Kayıtlı e-posta" value="{{ email or '' }}" required autocomplete="email">
<button class="btn btn-blue btn-block" type="submit">Kod Gönder</button>
</form>

<p class="auth-footer-link">
<a href="{{ url_for('auth.login') }}">Giriş ekranına dön</a>
</p>

</div>
</div>

{% endblock %}
