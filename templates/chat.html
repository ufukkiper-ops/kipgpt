{% extends "base.html" %}

{% block content %}

<div class="layout">

    <div class="sidebar">

        <h2>Kip Asistan</h2>

        <div class="user-box">
            <b>{{ username }}</b>
        </div>

        <a class="new-chat" href="/new_chat">
            + Yeni Sohbet
        </a>

        <div class="chat-search-wrap">
            <input
                type="text"
                id="chat-search"
                placeholder="Sohbet ara..."
                autocomplete="off">
        </div>

        <div class="chat-list" id="chat-list">
            {{ chat_list_html|safe }}
        </div>

    </div>

    <div class="main">

        <div class="topbar">

            <div class="active-chat-title">
                <b>{{ active_title }}</b>
            </div>

            <div class="right-buttons">

                <a href="/mail">
                    <button class="btn btn-green" type="button">📧 Mailler</button>
                </a>

                <form method="post" action="/clear_chat" style="margin:0;">
                    <button class="btn btn-red" type="submit">
                        Temizle
                    </button>
                </form>

                <a href="/logout">
                    <button class="btn btn-blue" type="button">
                        Çıkış
                    </button>
                </a>

            </div>

        </div>

        <div id="messages" class="messages">
            {{ messages_html|safe }}
        </div>

        <div id="file-preview-bar" class="file-preview-bar" hidden>
            <div id="file-preview-content"></div>
            <button type="button" id="file-preview-clear" class="file-preview-clear">×</button>
        </div>

        <div class="bottom">

            <form id="chat-form"
                  class="input-container"
                  method="post"
                  action="/"
                  onsubmit="return false;"
                  enctype="multipart/form-data">

                <button type="button" class="file-upload-btn" id="file-upload-btn" title="Dosya ekle">
                    <span class="file-upload-icon">📎</span>
                </button>

                <input id="file-input"
                       type="file"
                       name="file"
                       accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
                       hidden>

                <input type="hidden" name="action" value="text">

                <input id="chat-input"
                       type="text"
                       name="soru"
                       placeholder="Mesajınızı yazın..."
                       autocomplete="off"
                       autofocus>

                <button class="btn btn-blue" type="submit">
                    Gönder
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
