{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block content %}

<div class="auth-shell">
<div class="card">

<div class="auth-brand">
    <img class="auth-brand-logo" src="{{ url_for('static', filename='img/kipgpt-logo.png') }}" width="280" height="280" alt="KipGPT — Akıllı • Güvenilir • Yanında">
</div>

<h2>Kayıt Ol</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post" class="auth-form">

<input type="email" name="email" placeholder="E-posta adresiniz" required>
<input type="password" name="password" placeholder="KipGPT giriş şifreniz" required>
<input type="password" name="password2" placeholder="Şifre tekrar" required>

<button class="btn btn-blue btn-block" type="submit">Kayıt Ol</button>

</form>

<p class="register-note">Mail hesabını kayıt sonrası Mail sayfasından e-posta ve uygulama şifresi ile ekleyebilirsiniz.</p>

<p class="auth-footer-link">
<a href="{{ url_for('auth.login') }}">Zaten hesabın var mı? Giriş Yap</a>
</p>

</div>
</div>

{% endblock %}
