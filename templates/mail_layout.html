<!DOCTYPE html>

<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ title if title else "Kip Asistan Mail" }}</title>

    <!-- {{ ui_version }} -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <style>{{ mail_css|safe }}</style>
    <style>
        .mail-dialog-footer .account-submit-btn,
        .mail-dialog-footer #account-submit,
        .mail-dialog-footer #settings-submit {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            min-width: 140px !important;
            height: 42px !important;
            padding: 0 24px !important;
            border-radius: 21px !important;
            border: 2px solid #1557b0 !important;
            background-color: #1a73e8 !important;
            background-image: none !important;
            color: #ffffff !important;
            -webkit-text-fill-color: #ffffff !important;
            font-size: 15px !important;
            font-weight: 700 !important;
            font-family: Roboto, "Segoe UI", sans-serif !important;
            cursor: pointer !important;
            opacity: 1 !important;
            visibility: visible !important;
            box-shadow: 0 2px 6px rgba(26, 115, 232, 0.4) !important;
        }
    </style>

</head>

<body data-mail-folder="{{ folder }}" data-mail-account="{{ active_account_id or '' }}">

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}

</body>

</html>
