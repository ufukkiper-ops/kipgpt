<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>{{ title if title else "KipGPT" }}</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}?v=15">

    {% block head %}{% endblock %}

</head>

<body class="{% block body_class %}{% endblock %}">

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='js/speech.js') }}?v=1"></script>
<script src="{{ url_for('static', filename='js/app.js') }}?v=106"></script>

{% block scripts %}{% endblock %}

</body>

</html>
